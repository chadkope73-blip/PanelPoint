<!DOCTYPE html>
<html>
<head>

<title>Panel Pointer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:500px;
margin:auto;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input{
padding:12px;
width:80%;
margin:10px;
font-size:16px;
}

button{
padding:12px 20px;
font-size:16px;
background:#2f7d32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#256628;
}

.result{
margin-top:20px;
font-size:20px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h2>Solar Panel Direction Tool</h2>

<p>Enter your latitude to estimate the ideal solar panel tilt.</p>

<input id="latitude" placeholder="Example: 39.7">

<br>

<button onclick="calculateTilt()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>

function calculateTilt(){

let lat = document.getElementById("latitude").value;

let tilt = Math.round(lat * 0.76 + 3.1);

document.getElementById("result").innerHTML =
"Recommended Panel Tilt: " + tilt + "°";

}

</script>

</body>
