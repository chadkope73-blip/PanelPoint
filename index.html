<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Point</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      margin: 0;
      padding: 24px;
      text-align: center;
    }

    .container {
      background: white;
      max-width: 520px;
      margin: 40px auto;
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
    }

    p {
      color: #444;
      line-height: 1.5;
    }

    input,
    button {
      width: 100%;
      max-width: 320px;
      padding: 12px;
      font-size: 16px;
      margin-top: 12px;
      border-radius: 8px;
      box-sizing: border-box;
    }

    input {
      border: 1px solid #ccc;
    }

    button {
      border: none;
      background: #2f7d32;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #256628;
    }

    .secondary {
      background: #4b5563;
    }

    .secondary:hover {
      background: #374151;
    }

    .result {
      margin-top: 22px;
      padding: 16px;
      border-radius: 10px;
      background: #f7faf7;
      text-align: left;
      display: none;
    }

    .result strong {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .note {
      margin-top: 18px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Solar Panel Direction Tool</h1>

    <p>Enter latitude and longitude, or use your current location.</p>

    <input
      id="latitude"
      type="number"
      step="0.1"
      placeholder="Latitude (Example: 39.7)"
    />

    <input
      id="longitude"
      type="number"
      step="0.1"
      placeholder="Longitude (Example: -104.9)"
    />
    Longitude (West = negative, Example: -104.9)

    <button onclick="calculateTilt()">Calculate</button>
    <button class="secondary" onclick="useMyLocation()">Use My Location</button>

    <div id="result" class="result"></div>

    <div class="note">
      Location is optional and never stored.
    </div>
  </div>

  <script>
    function calculateTilt() {
      const latInput = document.getElementById("latitude").value;
      const lonInput = document.getElementById("longitude").value;

      const lat = parseFloat(latInput);
      const lon = parseFloat(lonInput);

      const resultBox = document.getElementById("result");

      if (isNaN(lat)) {
        resultBox.style.display = "block";
        resultBox.innerHTML = "<strong>Please enter a valid latitude.</strong>";
        return;
      }

      const yearTilt = Math.round(lat * 0.76 + 3.1);
const summerTilt = Math.round(lat * 0.9 - 23.5);
const winterTilt = Math.round(lat * 0.9 + 29);
      const azimuth = lat >= 0 ? 180 : 0;
const directionText = lat >= 0 ? "true south" : "true north";

      resultBox.style.display = "block";
      resultBox.innerHTML =
       resultBox.innerHTML =
  resultBox.innerHTML =
  "<strong>Year-Round Tilt: " + yearTilt + "°</strong>" +
"<div><b>Summer Tilt:</b> " + summerTilt + "°</div>" +
"<div><b>Winter Tilt:</b> " + winterTilt + "°</div>"
  "<div><b>Latitude:</b> " + lat + "°</div>" +
  "<div><b>Longitude:</b> " + (isNaN(lon) ? "not provided" : lon + "°") + "</div>" +
  "<div><b>Panel Direction:</b> " + directionText + " (" + azimuth + "°)</div>" +
  "<div><b>Tip:</b> This is a good fixed year-round starting angle.</div>";
    }

    function useMyLocation() {
      const resultBox = document.getElementById("result");

      if (!navigator.geolocation) {
        resultBox.style.display = "block";
        resultBox.innerHTML = "<strong>Geolocation is not supported.</strong>";
        return;
      }

      resultBox.style.display = "block";
      resultBox.innerHTML = "<strong>Getting your location...</strong>";

      navigator.geolocation.getCurrentPosition(
        function (position) {
          const lat = position.coords.latitude.toFixed(3);
          const lon = position.coords.longitude.toFixed(3);

          document.getElementById("latitude").value = lat;
          document.getElementById("longitude").value = lon;

          calculateTilt();
        },
        function () {
          resultBox.innerHTML =
            "<strong>Location access denied.</strong><div>Please enter coordinates manually.</div>";
        }
      );
    }
  </script>
</body>
</html>
