<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PanelPoint v1 - Solar Panel Tilt & Direction Calculator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f1416;
      margin: 0;
      padding: 24px;
      text-align: center;
      color: #e8e0c9;
    }

    .container {
      background: #1b2224;
      max-width: 560px;
      margin: 40px auto;
      padding: 28px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .brand-logo {
      max-width: 220px;
      width: 100%;
      height: auto;
      margin: 0 auto 18px auto;
      display: block;
      border-radius: 10px;
    }

    h1 {
      margin-top: 0;
      font-size: 28px;
      color: #c8a46b;
    }

    p {
      color: #cfc6ad;
      line-height: 1.5;
    }

    input,
    button {
      width: 100%;
      max-width: 340px;
      padding: 12px;
      font-size: 16px;
      margin-top: 12px;
      border-radius: 8px;
      box-sizing: border-box;
    }

    input {
      border: 1px solid #4f5a5e;
      background: #0f1416;
      color: #e8e0c9;
    }

    input::placeholder {
      color: #9f9884;
    }

    button {
      border: none;
      background: #c8a46b;
      color: #0f1416;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #d9b983;
    }

    .secondary {
      background: #2e5e5b;
      color: #e8e0c9;
    }

    .secondary:hover {
      background: #3d7a76;
    }

    .helper {
      margin-top: 8px;
      font-size: 14px;
      color: #afa890;
      max-width: 340px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
      line-height: 1.4;
    }

    .result {
      margin-top: 22px;
      padding: 16px;
      border-radius: 10px;
      background: #0f1416;
      border: 1px solid #4f5a5e;
      text-align: left;
      display: none;
      line-height: 1.55;
    }

    .result strong {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
      color: #c8a46b;
    }

    .note {
      margin-top: 18px;
      font-size: 14px;
      color: #9f9884;
    }

    .disclaimer {
      margin-top: 18px;
      padding: 12px;
      background: #1b2224;
      border: 1px solid #4f5a5e;
      border-radius: 8px;
      font-size: 14px;
      color: #cfc6ad;
      text-align: left;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.jpg" alt="In Tandem Toolworks Logo" class="brand-logo" />

    <h1>Solar Panel Tilt & Direction Calculator</h1>

    <p>
      Enter a ZIP code, latitude and longitude, or use your current location.
    </p>

    <input
      id="zipcode"
      type="text"
      inputmode="numeric"
      maxlength="5"
      placeholder="ZIP Code (Example: 80205)"
    />

    <button class="secondary" onclick="useZipCode()">Use ZIP Code</button>

    <input
      id="latitude"
      type="number"
      step="0.1"
      placeholder="Latitude (Example: 39.7)"
    />

    <input
      id="longitude"
      type="number"
      step="0.1"
      placeholder="Longitude (Example: -104.9)"
    />

    <div class="helper">
      Longitude west of Greenwich is negative. Example: Colorado is about -104.9
